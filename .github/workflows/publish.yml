name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2

      - name: Verify tag matches deno.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match deno.json version $version" >&2
            exit 1
          fi

      - name: Verify
        run: deno task ci

      - name: Publish to JSR
        run: deno publish
